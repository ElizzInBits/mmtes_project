services:

  # ─── Backend HoraCerta ───────────────────────────────────────────────────────
  horacerta-backend:
    container_name: horacerta_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - EVOLUTION_API_URL=http://evolution_api:8080
      - EVOLUTION_API_TOKEN=429683C4C977415CAAFCCE10F7D57E11
      - EVOLUTION_API_INSTANCE=horacerta
      - GOOGLE_CALENDAR_ID=elizabethm174394@gmail.com
      - CHATBOT_TRIGGER_KEYWORD=/teste
    networks:
      - horacerta-net
    depends_on:
      - evolution-api

  # ─── Evolution API ───────────────────────────────────────────────────────────
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - evolution-redis
      - evolution-postgres
    ports:
      - "8082:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - horacerta-net
    env_file:
      - ./evolution/evolution-api/.env

  # ─── Evolution Manager (frontend) ────────────────────────────────────────────
  evolution-frontend:
    container_name: evolution_frontend
    image: evoapicloud/evolution-manager:latest
    restart: always
    ports:
      - "3000:80"
    networks:
      - horacerta-net

  # ─── Redis ───────────────────────────────────────────────────────────────────
  evolution-redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      horacerta-net:
        aliases:
          - evolution-redis

  # ─── Postgres ────────────────────────────────────────────────────────────────
  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=abacaxiverde
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - horacerta-net

volumes:
  evolution_instances:
  evolution_redis:
  postgres_data:

networks:
  horacerta-net:
    name: horacerta-net
    driver: bridge
